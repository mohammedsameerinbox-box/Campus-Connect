<!DOCTYPE html>
<html>
<head>
    <title>Add Company</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Add Company</h1>

<form method="POST">

    <input type="text"
           name="company"
           placeholder="Enter Company Name"
           required>

    <br><br>

    <input type="text"
           name="location"
           placeholder="Enter Location"
           required>

    <br><br>

    <button type="submit">
        ➕ Add Company
    </button>

</form>
</body>
</html>
